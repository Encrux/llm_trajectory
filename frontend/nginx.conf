server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MuJoCo WASM + meshes — cache and serve pre-compressed files
    location /vendor/ {
        expires 7d;
        gzip_static on;
    }
    location /mujoco/ {
        expires 7d;
        gzip_static on;
    }

    # Gzip — include mesh formats (OBJ is text, compresses ~70%)
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/octet-stream
        model/obj;

    # Treat .obj and .stl as gzippable
    gzip_proxied any;
}
